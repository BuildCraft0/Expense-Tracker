<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">Expense Tracker demo preview</title>
  <desc id="desc">A stylized dashboard preview showing balances, transactions, analytics, and wallet tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
