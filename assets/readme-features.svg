<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Expense Tracker feature gallery</title>
  <desc id="desc">A pictorial grid highlighting budgeting, analytics, wallets, security, backup, and offline features.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c1b"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <linearGradient id="violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="mint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="1360" cy="110" r="150" fill="#8b5cf6" opacity="0.18" filter="url(#blur)"/>
  <circle cx="220" cy="880" r="170" fill="#14b8a6" opacity="0.15" filter="url(#blur)"/>
  <circle cx="560" cy="110" r="120" fill="#ec4899" opacity="0.12" filter="url(#blur)"/>

  <text x="90" y="118" fill="#f8fafc" font-size="58" font-weight="700" font-family="Poppins, Segoe UI, Arial, sans-serif">Pictorial Feature Gallery</text>
  <text x="90" y="170" fill="#cbd5e1" font-size="28" font-family="Poppins, Segoe UI, Arial, sans-serif">The app combines tracking, planning, reporting, and privacy into one static web workspace.</text>

  <g transform="translate(90 240)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="430" height="280" rx="34" fill="url(#card)" stroke="rgba(255,255,255,0.1)"/>
      <circle cx="90" cy="90" r="46" fill="rgba(139,92,246,0.18)"/>
      <rect x="58" y="66" width="64" height="48" rx="14" fill="url(#violet)"/>
      <rect x="72" y="54" width="36" height="18" rx="9" fill="#f8fafc" opacity="0.92"/>
      <rect x="170" y="62" width="162" height="18" rx="9" fill="#f8fafc"/>
      <rect x="170" y="96" width="126" height="10" rx="5" fill="#94a3b8"/>
      <rect x="58" y="164" width="314" height="18" rx="9" fill="rgba(255,255,255,0.06)"/>
      <rect x="58" y="200" width="252" height="18" rx="9" fill="rgba(255,255,255,0.06)"/>
      <text x="58" y="246" fill="#f8fafc" font-size="30" font-weight="600" font-family="Poppins, Segoe UI, Arial, sans-serif">Budget Planning</text>
      <text x="58" y="271" fill="#cbd5e1" font-size="19" font-family="Poppins, Segoe UI, Arial, sans-serif">Set monthly limits and watch progress before overspending happens.</text>
    </g>

    <g transform="translate(495 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="430" height="280" rx="34" fill="url(#card)" stroke="rgba(255,255,255,0.1)"/>
      <circle cx="86" cy="92" r="44" fill="rgba(16,185,129,0.16)"/>
      <circle cx="86" cy="92" r="30" fill="none" stroke="url(#mint)" stroke-width="18"/>
      <path d="M86 62 A30 30 0 0 1 112 108" fill="none" stroke="#f8fafc" stroke-width="18" stroke-linecap="round"/>
      <path d="M186 162 C220 132, 252 144, 286 118 S348 118, 368 90" fill="none" stroke="url(#sky)" stroke-width="10" stroke-linecap="round"/>
      <circle cx="368" cy="90" r="7" fill="#f8fafc"/>
      <rect x="176" y="62" width="158" height="18" rx="9" fill="#f8fafc"/>
      <rect x="176" y="96" width="118" height="10" rx="5" fill="#94a3b8"/>
      <text x="58" y="246" fill="#f8fafc" font-size="30" font-weight="600" font-family="Poppins, Segoe UI, Arial, sans-serif">Smart Reports</text>
      <text x="58" y="271" fill="#cbd5e1" font-size="19" font-family="Poppins, Segoe UI, Arial, sans-serif">Visual charts explain income, expenses, savings, and top categories.</text>
    </g>

    <g transform="translate(990 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="430" height="280" rx="34" fill="url(#card)" stroke="rgba(255,255,255,0.1)"/>
      <circle cx="88" cy="90" r="46" fill="rgba(59,130,246,0.16)"/>
      <rect x="52" y="64" width="78" height="46" rx="16" fill="url(#sky)"/>
      <rect x="64" y="94" width="54" height="10" rx="5" fill="#eff6ff"/>
      <rect x="74" y="46" width="56" height="36" rx="12" fill="rgba(255,255,255,0.14)"/>
      <rect x="170" y="62" width="152" height="18" rx="9" fill="#f8fafc"/>
      <rect x="170" y="96" width="116" height="10" rx="5" fill="#94a3b8"/>
      <rect x="58" y="164" width="314" height="20" rx="10" fill="rgba(255,255,255,0.06)"/>
      <rect x="58" y="198" width="274" height="20" rx="10" fill="rgba(255,255,255,0.06)"/>
      <text x="58" y="246" fill="#f8fafc" font-size="30" font-weight="600" font-family="Poppins, Segoe UI, Arial, sans-serif">Multi-Wallet Control</text>
      <text x="58" y="271" fill="#cbd5e1" font-size="19" font-family="Poppins, Segoe UI, Arial, sans-serif">Track balances, move funds, and separate cash flows by wallet.</text>
    </g>

    <g transform="translate(0 340)" filter="url(#shadow)">
      <rect x="0" y="0" width="430" height="280" rx="34" fill="url(#card)" stroke="rgba(255,255,255,0.1)"/>
      <circle cx="88" cy="92" r="46" fill="rgba(236,72,153,0.14)"/>
      <path d="M88 54 L126 72 V102 C126 128 110 148 88 160 C66 148 50 128 50 102 V72 Z" fill="url(#violet)"/>
      <rect x="78" y="93" width="20" height="32" rx="10" fill="#f8fafc"/>
      <rect x="70" y="82" width="36" height="22" rx="11" fill="none" stroke="#f8fafc" stroke-width="8"/>
      <rect x="170" y="62" width="152" height="18" rx="9" fill="#f8fafc"/>
      <rect x="170" y="96" width="104" height="10" rx="5" fill="#94a3b8"/>
      <rect x="58" y="168" width="304" height="20" rx="10" fill="rgba(255,255,255,0.06)"/>
      <rect x="58" y="202" width="240" height="20" rx="10" fill="rgba(255,255,255,0.06)"/>
      <text x="58" y="246" fill="#f8fafc" font-size="30" font-weight="600" font-family="Poppins, Segoe UI, Arial, sans-serif">Secure Access</text>
      <text x="58" y="271" fill="#cbd5e1" font-size="19" font-family="Poppins, Segoe UI, Arial, sans-serif">Optional PIN lock protects the workspace before finance data opens.</text>
    </g>

    <g transform="translate(495 340)" filter="url(#shadow)">
      <rect x="0" y="0" width="430" height="280" rx="34" fill="url(#card)" stroke="rgba(255,255,255,0.1)"/>
      <circle cx="88" cy="92" r="46" fill="rgba(16,185,129,0.14)"/>
      <path d="M52 102 C52 72 72 56 88 56 C104 56 124 72 124 102 V106 H138 V126 H38 V106 H52 Z" fill="url(#mint)"/>
      <path d="M88 126 V154" stroke="#f8fafc" stroke-width="10" stroke-linecap="round"/>
      <path d="M70 142 L88 160 L106 142" fill="none" stroke="#f8fafc" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="170" y="62" width="150" height="18" rx="9" fill="#f8fafc"/>
      <rect x="170" y="96" width="126" height="10" rx="5" fill="#94a3b8"/>
      <rect x="58" y="170" width="84" height="32" rx="16" fill="rgba(59,130,246,0.18)"/>
      <rect x="152" y="170" width="84" height="32" rx="16" fill="rgba(16,185,129,0.18)"/>
      <rect x="246" y="170" width="84" height="32" rx="16" fill="rgba(245,158,11,0.18)"/>
      <text x="80" y="191" fill="#dbeafe" font-size="16" font-family="Poppins, Segoe UI, Arial, sans-serif">JSON</text>
      <text x="175" y="191" fill="#d1fae5" font-size="16" font-family="Poppins, Segoe UI, Arial, sans-serif">CSV</text>
      <text x="270" y="191" fill="#fef3c7" font-size="16" font-family="Poppins, Segoe UI, Arial, sans-serif">Backup</text>
      <text x="58" y="246" fill="#f8fafc" font-size="30" font-weight="600" font-family="Poppins, Segoe UI, Arial, sans-serif">Backup and Export</text>
      <text x="58" y="271" fill="#cbd5e1" font-size="19" font-family="Poppins, Segoe UI, Arial, sans-serif">Restore app data safely and export reports for external use.</text>
    </g>

    <g transform="translate(990 340)" filter="url(#shadow)">
      <rect x="0" y="0" width="430" height="280" rx="34" fill="url(#card)" stroke="rgba(255,255,255,0.1)"/>
      <circle cx="88" cy="92" r="46" fill="rgba(59,130,246,0.14)"/>
      <rect x="60" y="52" width="56" height="82" rx="14" fill="url(#sky)"/>
      <rect x="72" y="66" width="32" height="44" rx="8" fill="#eff6ff"/>
      <circle cx="88" cy="122" r="4" fill="#eff6ff"/>
      <path d="M145 112 C169 84 208 84 232 112" fill="none" stroke="#f8fafc" stroke-width="8" stroke-linecap="round"/>
      <path d="M160 128 C178 108 198 108 216 128" fill="none" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round"/>
      <path d="M178 144 C186 134 190 134 198 144" fill="none" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
      <circle cx="188" cy="160" r="7" fill="url(#mint)"/>
      <rect x="170" y="62" width="146" height="18" rx="9" fill="#f8fafc"/>
      <rect x="170" y="96" width="124" height="10" rx="5" fill="#94a3b8"/>
      <rect x="58" y="170" width="310" height="20" rx="10" fill="rgba(255,255,255,0.06)"/>
      <rect x="58" y="204" width="264" height="20" rx="10" fill="rgba(255,255,255,0.06)"/>
      <text x="58" y="246" fill="#f8fafc" font-size="30" font-weight="600" font-family="Poppins, Segoe UI, Arial, sans-serif">PWA and Offline Use</text>
      <text x="58" y="271" fill="#cbd5e1" font-size="19" font-family="Poppins, Segoe UI, Arial, sans-serif">Cached assets keep the static app fast and usable after first load.</text>
    </g>
  </g>
</svg>
