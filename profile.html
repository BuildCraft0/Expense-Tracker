<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker - Profile & Tools</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">

  <style>
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    
    @media (max-width: 1024px) {
      .profile-grid {
        grid-template-columns: 1fr;
      }
    }
    
    .profile-card-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    
    .profile-avatar-large {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--accent-primary);
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }
    
    .profile-avatar-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body class="animate-fade">

  <div id="app-layout">
    
    <div class="profile-grid animate-slide">
      
      <!-- Left Column: Profile Info & Wallets -->
      <div style="display:flex; flex-direction:column; gap:24px;">
        
        <!-- Profile info & Savings progress -->
        <div class="glass-card">
          <div class="profile-card-header">
            <div class="profile-avatar-large" onclick="triggerAvatarUpload()">
              <img id="profile-img-large" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=256&auto=format&fit=crop" alt="Large Avatar">
              <div style="position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.5); font-size:0.6rem; color:#fff; text-align:center; padding:2px 0;">EDIT</div>
            </div>
            <input type="file" id="profile-avatar-input" accept="image/*" onchange="uploadAvatarImage(event)" style="display:none;">
            
            <div style="flex-grow:1;">
              <div class="form-group" style="margin-bottom:8px;">
                <input type="text" class="input-field" id="profile-name" placeholder="Your Name" style="font-weight:600; font-size:1.1rem; padding:6px 12px; background:rgba(0,0,0,0.15);" onchange="saveProfileField('userName', this.value)">
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <input type="email" class="input-field" id="profile-email" placeholder="Your Email" style="font-size:0.85rem; padding:6px 12px; background:rgba(0,0,0,0.15);" onchange="saveProfileField('userEmail', this.value)">
              </div>
            </div>
          </div>
          
          <!-- Savings Target Progress Widget -->
          <div style="border-top:1px solid var(--glass-border); padding-top:16px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
              <div>
                <h4 style="font-size:0.9rem; font-weight:600;">Savings Goal Target</h4>
                <p style="font-size:0.75rem; color:var(--text-secondary); margin-top:2px;">Goal Balance Saved: <span id="savings-goal-saved-val">$0.00</span></p>
              </div>
              <div style="display:flex; align-items:center; gap:8px;">
                <input type="number" class="input-field" id="profile-savings-target" style="width:110px; padding:6px 12px; font-size:0.85rem;" onchange="saveSavingsGoal(this.value)">
              </div>
            </div>
            
            <div class="progress-bar-container" style="margin-bottom:8px;">
              <div id="savings-progress-fill" class="progress-bar-fill" style="background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));"></div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:var(--text-secondary);">
              <span id="savings-progress-percent">0% Completed</span>
              <span id="savings-goal-target-val">$0.00</span>
            </div>
          </div>
        </div>

        <!-- Wallet Management -->
        <div class="glass-card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="font-weight:600;"><i class="fas fa-wallet" style="color:var(--accent-primary); margin-right:8px;"></i> Wallet Management</h3>
            <div style="display:flex; gap:10px;">
              <button class="btn btn-outline" style="padding:6px 12px; font-size:0.8rem;" onclick="openTransferModal()"><i class="fas fa-exchange-alt"></i> Transfer</button>
              <button class="btn btn-primary" style="padding:6px 12px; font-size:0.8rem;" onclick="openWalletModal()"><i class="fas fa-plus"></i> Add Wallet</button>
            </div>
          </div>

          <div style="display:flex; flex-direction:column; gap:12px;" id="profile-wallets-list">
            <!-- Wallets list with delete buttons -->
          </div>
        </div>

      </div>

      <!-- Right Column: Financial Tools -->
      <div style="display:flex; flex-direction:column; gap:24px;">
        
        <!-- Loan/EMI Calculator -->
        <div class="glass-card">
          <h3 style="font-weight:600; margin-bottom:16px;"><i class="fas fa-hand-holding-dollar" style="color:var(--accent-secondary); margin-right:8px;"></i> EMI & Loan Calculator</h3>
          
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:16px;">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Principal Amount</label>
              <input type="number" class="input-field" id="emi-principal" value="50000" oninput="calculateEMI()">
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">Interest Rate (% p.a.)</label>
              <input type="number" step="0.1" class="input-field" id="emi-rate" value="10.5" oninput="calculateEMI()">
            </div>
          </div>

          <div class="form-group" style="margin-bottom:16px;">
            <label class="form-label">Tenure (in Months)</label>
            <input type="number" class="input-field" id="emi-months" value="24" oninput="calculateEMI()">
          </div>

          <div class="calc-container" style="margin-top:20px;">
            <div class="calc-display">
              <div class="label">Monthly EMI Payment</div>
              <div class="value" id="emi-monthly-payment">$0.00</div>
            </div>
            <div class="calc-display">
              <div class="label">Total Interest Payable</div>
              <div class="value" id="emi-total-interest" style="color:var(--color-warning);">$0.00</div>
            </div>
          </div>
        </div>

        <!-- Tax Calculator Widget -->
        <div class="glass-card">
          <h3 style="font-weight:600; margin-bottom:16px;"><i class="fas fa-file-invoice-dollar" style="color:var(--color-info); margin-right:8px;"></i> Income Tax Calculator</h3>
          
          <div class="form-group" style="margin-bottom:16px;">
            <label class="form-label">Annual Gross Income</label>
            <div style="display:flex; gap:10px;">
              <input type="number" class="input-field" id="tax-annual-income" value="60000">
              <button class="btn btn-primary" onclick="calculateTax()">Calculate</button>
            </div>
          </div>
          
          <div class="calc-container">
            <div class="calc-display">
              <div class="label">Estimated Annual Tax</div>
              <div class="value" id="tax-annual-estimate" style="color:var(--color-danger);">$0.00</div>
            </div>
            <div class="calc-display">
              <div class="label">Net Take-Home Monthly</div>
              <div class="value" id="tax-monthly-net">$0.00</div>
            </div>
          </div>
        </div>

      </div>

    </div>

    <!-- Create/Edit Wallet Modal -->
    <div class="modal-overlay" id="wallet-modal">
      <div class="modal-content" style="max-width:400px;">
        <div class="modal-header">
          <h3 id="wallet-modal-title">Add Wallet</h3>
          <button class="modal-close" onclick="closeWalletModal()"><i class="fas fa-times"></i></button>
        </div>
        <form id="wallet-form" onsubmit="saveWalletForm(event)">
          <input type="hidden" id="wallet-id">
          
          <div class="form-group">
            <label class="form-label" for="wallet-name">Wallet Name</label>
            <input type="text" class="input-field" id="wallet-name" required placeholder="e.g. Bank Account">
          </div>
          
          <div class="form-group">
            <label class="form-label" for="wallet-type">Wallet Type</label>
            <select class="select-field" id="wallet-type" required>
              <option value="Cash">Cash</option>
              <option value="Bank">Bank Account</option>
              <option value="Credit Card">Credit Card</option>
              <option value="UPI">UPI/Paytm Wallet</option>
            </select>
          </div>
          
          <div class="form-group" id="wallet-base-balance-group">
            <label class="form-label" for="wallet-base-balance">Base Starting Balance</label>
            <input type="number" class="input-field" id="wallet-base-balance" value="0">
          </div>
          
          <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px;">
            <button type="button" class="btn" onclick="closeWalletModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Wallet Transfer Funds Modal -->
    <div class="modal-overlay" id="transfer-modal">
      <div class="modal-content" style="max-width:400px;">
        <div class="modal-header">
          <h3>Wallet Transfer</h3>
          <button class="modal-close" onclick="closeTransferModal()"><i class="fas fa-times"></i></button>
        </div>
        <form onsubmit="executeWalletTransfer(event)">
          <div class="form-group">
            <label class="form-label" for="transfer-from">Source Wallet (From)</label>
            <select class="select-field" id="transfer-from" required></select>
          </div>
          <div class="form-group">
            <label class="form-label" for="transfer-to">Destination Wallet (To)</label>
            <select class="select-field" id="transfer-to" required></select>
          </div>
          <div class="form-group">
            <label class="form-label" for="transfer-amount">Transfer Amount</label>
            <input type="number" class="input-field" id="transfer-amount" required min="1" step="any">
          </div>
          <div class="form-group">
            <label class="form-label" for="transfer-notes">Notes</label>
            <input type="text" class="input-field" id="transfer-notes" placeholder="Wallet Transfer">
          </div>
          
          <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px;">
            <button type="button" class="btn" onclick="closeTransferModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">Transfer</button>
          </div>
        </form>
      </div>
    </div>

  </div>

  <!-- Load Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/wallet.js"></script>
  <script src="js/budget.js"></script>
  <script src="js/transaction.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    // Inline Profile management scripts
    document.addEventListener('DOMContentLoaded', () => {
      loadProfilePage();
      calculateEMI();
      calculateTax();
    });

    function loadProfilePage() {
      const state = window.StorageModule.loadState();
      
      // Load user metadata details
      document.getElementById('profile-name').value = state.settings.userName || 'Finance Pro';
      document.getElementById('profile-email').value = state.settings.userEmail || 'hello@tracker.com';
      document.getElementById('profile-savings-target').value = state.savingsGoal.target || 0;
      
      if (state.settings.avatarUrl) {
        document.getElementById('profile-img-large').src = state.settings.avatarUrl;
      }
      
      renderSavingsGoalMetrics();
      renderWalletsList();
    }

    function saveProfileField(key, val) {
      const state = window.StorageModule.loadState();
      state.settings[key] = val;
      window.StorageModule.saveState();
      window.AppModule.showToast('Profile updated', 'success');
      
      // Update global header badge by reloading elements
      const badgeName = document.querySelector('.user-profile-badge p');
      if (badgeName) badgeName.textContent = state.settings.userName || 'Finance Pro';
    }

    function saveSavingsGoal(val) {
      const target = Number(val) || 0;
      const state = window.StorageModule.loadState();
      state.savingsGoal.target = target;
      window.StorageModule.saveState();
      
      renderSavingsGoalMetrics();
      window.AppModule.showToast('Savings Target Goal updated', 'success');
    }

    // Savings Calculation
    function renderSavingsGoalMetrics() {
      const state = window.StorageModule.loadState();
      const target = state.savingsGoal.target || 0;
      
      // Current savings = total income - total expenses
      const totalIncome = state.transactions
        .filter(t => t.type === 'income')
        .reduce((sum, t) => sum + Number(t.amount), 0);
      const totalExpense = state.transactions
        .filter(t => t.type === 'expense')
        .reduce((sum, t) => sum + Number(t.amount), 0);
        
      const currentSavings = totalIncome - totalExpense;
      const ratio = target > 0 ? Math.min(100, Math.max(0, (currentSavings / target) * 100)) : 0;
      
      document.getElementById('savings-goal-saved-val').textContent = window.SettingsModule.formatCurrency(currentSavings);
      document.getElementById('savings-goal-target-val').textContent = window.SettingsModule.formatCurrency(target);
      document.getElementById('savings-progress-percent').textContent = `${Math.round(ratio)}% Completed`;
      document.getElementById('savings-progress-fill').style.width = `${ratio}%`;
    }

    // Wallets Renders
    function renderWalletsList() {
      const state = window.StorageModule.loadState();
      const listEl = document.getElementById('profile-wallets-list');
      if (!listEl) return;
      
      listEl.innerHTML = state.wallets.map(w => {
        let icon = 'fa-wallet';
        if (w.type === 'Bank') icon = 'fa-building-columns';
        if (w.type === 'Credit Card') icon = 'fa-credit-card';
        if (w.type === 'UPI') icon = 'fa-mobile-screen-button';
        
        return `
          <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:rgba(255,255,255,0.02); border:1px solid var(--glass-border); border-radius:var(--card-radius);">
            <div style="display:flex; align-items:center; gap:12px;">
              <i class="fas ${icon}" style="font-size:1.3rem; color:var(--accent-primary);"></i>
              <div>
                <span style="font-weight:600; font-size:0.9rem;">${w.name}</span>
                <span style="font-size:0.75rem; color:var(--text-secondary); display:block;">Type: ${w.type} &bull; Starting: ${window.SettingsModule.formatCurrency(w.baseBalance)}</span>
              </div>
            </div>
            <div style="display:flex; align-items:center; gap:16px;">
              <span style="font-weight:700; font-size:1rem; color:${w.balance < 0 ? 'var(--color-danger)' : 'inherit'};">
                ${window.SettingsModule.formatCurrency(w.balance)}
              </span>
              <div style="display:flex; gap:6px;">
                <button class="action-icon-btn" onclick="openEditWalletModal('${w.id}')" title="Edit"><i class="fas fa-edit"></i></button>
                <button class="action-icon-btn" onclick="triggerDeleteWallet('${w.id}')" title="Delete" style="color:var(--color-danger);"><i class="fas fa-trash-alt"></i></button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Create / Edit Wallets modals
    function openWalletModal() {
      document.getElementById('wallet-form').reset();
      document.getElementById('wallet-id').value = '';
      document.getElementById('wallet-modal-title').textContent = 'Add Wallet';
      document.getElementById('wallet-base-balance-group').style.display = 'block';
      document.getElementById('wallet-modal').classList.add('active');
    }

    function openEditWalletModal(id) {
      const state = window.StorageModule.loadState();
      const wallet = state.wallets.find(w => w.id === id);
      if (!wallet) return;
      
      document.getElementById('wallet-id').value = wallet.id;
      document.getElementById('wallet-modal-title').textContent = 'Edit Wallet';
      document.getElementById('wallet-name').value = wallet.name;
      document.getElementById('wallet-type').value = wallet.type;
      document.getElementById('wallet-base-balance').value = wallet.baseBalance;
      // Hide base balance during edit to prevent confusing reconciliation balance shifts
      document.getElementById('wallet-base-balance-group').style.display = 'none';
      
      document.getElementById('wallet-modal').classList.add('active');
    }

    function closeWalletModal() {
      document.getElementById('wallet-modal').classList.remove('active');
    }

    function saveWalletForm(e) {
      e.preventDefault();
      const id = document.getElementById('wallet-id').value;
      const name = document.getElementById('wallet-name').value.trim();
      const type = document.getElementById('wallet-type').value;
      const baseBalance = Number(document.getElementById('wallet-base-balance').value) || 0;
      
      if (id) {
        window.WalletModule.updateWallet(id, name, type, baseBalance);
        window.AppModule.showToast('Wallet updated successfully', 'success');
      } else {
        window.WalletModule.addWallet(name, type, baseBalance);
        window.AppModule.showToast('Wallet added successfully', 'success');
      }
      
      closeWalletModal();
      loadProfilePage();
    }

    function triggerDeleteWallet(id) {
      window.AppModule.showConfirm('Delete Wallet', 'Are you sure you want to delete this wallet? Its associated transactions will be transferred to another remaining wallet.', () => {
        const success = window.WalletModule.deleteWallet(id);
        if (success) {
          loadProfilePage();
          window.AppModule.showToast('Wallet deleted successfully.', 'success');
        } else {
          window.AppModule.showToast('You cannot delete your last wallet!', 'danger');
        }
      });
    }

    // Inter-Wallet Transfers Modal Actions
    function openTransferModal() {
      const state = window.StorageModule.loadState();
      const fromSelect = document.getElementById('transfer-from');
      const toSelect = document.getElementById('transfer-to');
      
      const options = state.wallets.map(w => `<option value="${w.id}">${w.name} (${window.SettingsModule.formatCurrency(w.balance)})</option>`).join('');
      fromSelect.innerHTML = options;
      toSelect.innerHTML = options;
      
      document.getElementById('transfer-modal').classList.add('active');
    }

    function closeTransferModal() {
      document.getElementById('transfer-modal').classList.remove('active');
    }

    function executeWalletTransfer(e) {
      e.preventDefault();
      const from = document.getElementById('transfer-from').value;
      const to = document.getElementById('transfer-to').value;
      const amount = Number(document.getElementById('transfer-amount').value);
      const notes = document.getElementById('transfer-notes').value.trim();
      
      if (from === to) {
        window.AppModule.showToast('Source and Destination wallets cannot be the same.', 'danger');
        return;
      }
      
      const success = window.WalletModule.transferFunds(from, to, amount, notes);
      if (success) {
        closeTransferModal();
        loadProfilePage();
        window.AppModule.showToast('Transfer transaction recorded successfully.', 'success');
      } else {
        window.AppModule.showToast('Transfer failed. Please check your wallets.', 'danger');
      }
    }

    // Image Avatar uploading
    function triggerAvatarUpload() {
      document.getElementById('profile-avatar-input').click();
    }

    function uploadAvatarImage(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
          const avatarUrl = evt.target.result;
          document.getElementById('profile-img-large').src = avatarUrl;
          
          const state = window.StorageModule.loadState();
          state.settings.avatarUrl = avatarUrl;
          window.StorageModule.saveState();
          
          // Re-render navbar avatar immediately
          const navImg = document.querySelector('.avatar-wrapper img');
          if (navImg) navImg.src = avatarUrl;
          
          window.AppModule.showToast('Profile image updated.', 'success');
        };
        reader.readAsDataURL(file);
      }
    }

    // Financial Calculators Formulae
    function calculateEMI() {
      const principal = Number(document.getElementById('emi-principal').value) || 0;
      const ratePerAnnum = Number(document.getElementById('emi-rate').value) || 0;
      const months = Number(document.getElementById('emi-months').value) || 0;
      
      if (principal <= 0 || ratePerAnnum <= 0 || months <= 0) {
        document.getElementById('emi-monthly-payment').textContent = window.SettingsModule.formatCurrency(0);
        document.getElementById('emi-total-interest').textContent = window.SettingsModule.formatCurrency(0);
        return;
      }
      
      const r = (ratePerAnnum / 12) / 100; // monthly rate
      
      // EMI = [P x R x (1+R)^N]/[(1+R)^N-1]
      const emiVal = (principal * r * Math.pow(1 + r, months)) / (Math.pow(1 + r, months) - 1);
      const totalPayment = emiVal * months;
      const totalInterestVal = totalPayment - principal;
      
      document.getElementById('emi-monthly-payment').textContent = window.SettingsModule.formatCurrency(emiVal);
      document.getElementById('emi-total-interest').textContent = window.SettingsModule.formatCurrency(totalInterestVal);
    }

    function calculateTax() {
      const gross = Number(document.getElementById('tax-annual-income').value) || 0;
      
      // Simplified bracket structure (Progressive Tax)
      // Up to 10k: 10%
      // 10k to 50k: 15%
      // 50k to 100k: 25%
      // Above 100k: 30%
      let tax = 0;
      if (gross <= 10000) {
        tax = gross * 0.1;
      } else if (gross <= 50000) {
        tax = (10000 * 0.1) + ((gross - 10000) * 0.15);
      } else if (gross <= 100000) {
        tax = (10000 * 0.1) + (40000 * 0.15) + ((gross - 50000) * 0.25);
      } else {
        tax = (10000 * 0.1) + (40000 * 0.15) + (50000 * 0.25) + ((gross - 100000) * 0.3);
      }
      
      const netTakeHome = gross - tax;
      const monthlyNet = netTakeHome / 12;
      
      document.getElementById('tax-annual-estimate').textContent = window.SettingsModule.formatCurrency(tax);
      document.getElementById('tax-monthly-net').textContent = window.SettingsModule.formatCurrency(monthlyNet);
    }
  </script>
</body>
</html>
