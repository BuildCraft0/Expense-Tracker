<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker - Settings</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  
  <style>
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    
    @media (max-width: 1024px) {
      .settings-grid {
        grid-template-columns: 1fr;
      }
    }
    
    .category-budget-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }
    
    .category-budget-row input {
      width: 120px;
    }
  </style>
</head>
<body class="animate-fade">

  <div id="app-layout">
    
    <div class="settings-grid animate-slide">
      
      <!-- Left Column: Settings Configuration -->
      <div style="display:flex; flex-direction:column; gap:24px;">
        
        <!-- Theme & Language Card -->
        <div class="glass-card">
          <h3 style="font-weight:600; margin-bottom:20px;"><i class="fas fa-magic" style="color:var(--accent-primary); margin-right:8px;"></i> Visuals & Language</h3>
          
          <div class="form-group">
            <label class="form-label" data-translate="theme_setting">Application Theme</label>
            <div style="display:flex; gap:16px;">
              <button class="btn" id="theme-btn-dark" onclick="selectThemeSetting('dark')" style="flex:1;">Dark Mode</button>
              <button class="btn" id="theme-btn-light" onclick="selectThemeSetting('light')" style="flex:1;">Light Mode</button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" data-translate="language_setting">Select Language</label>
            <select class="select-field" id="setting-language" onchange="saveAppSetting('language', this.value); updateLocalizations();">
              <option value="en">English</option>
              <option value="hi">हिन्दी (Hindi)</option>
            </select>
          </div>
        </div>

        <!-- Currency & Formats Card -->
        <div class="glass-card">
          <h3 style="font-weight:600; margin-bottom:20px;"><i class="fas fa-globe" style="color:var(--accent-secondary); margin-right:8px;"></i> Currency & Formats</h3>
          
          <div class="form-group">
            <label class="form-label" data-translate="currency_setting">Select Currency</label>
            <select class="select-field" id="setting-currency" onchange="saveAppSetting('currency', this.value)">
              <option value="USD">USD ($)</option>
              <option value="INR">INR (₹)</option>
              <option value="EUR">EUR (€)</option>
              <option value="GBP">GBP (£)</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" data-translate="date_format_setting">Date Format</label>
            <select class="select-field" id="setting-date-format" onchange="saveAppSetting('dateFormat', this.value)">
              <option value="YYYY-MM-DD">YYYY-MM-DD</option>
              <option value="DD-MM-YYYY">DD-MM-YYYY</option>
              <option value="MM-DD-YYYY">MM-DD-YYYY</option>
            </select>
          </div>
          
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
            <label class="form-label" for="setting-notifications">Allow Notifications & Alert Toast Badges</label>
            <input type="checkbox" id="setting-notifications" onchange="saveAppSetting('notifications', this.checked)" style="width:18px; height:18px; cursor:pointer;">
          </div>
        </div>

        <!-- Security Lock Card -->
        <div class="glass-card">
          <h3 style="font-weight:600; margin-bottom:20px;"><i class="fas fa-key" style="color:var(--color-warning); margin-right:8px;"></i> Security PIN Lock</h3>
          
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <label class="form-label" for="setting-pin-enabled" data-translate="pin_enabled">Enable App Lock PIN</label>
            <input type="checkbox" id="setting-pin-enabled" onchange="togglePinLockStatus(this.checked)" style="width:18px; height:18px; cursor:pointer;">
          </div>

          <div id="pin-change-group" style="display:none; flex-direction:column; gap:12px;" class="animate-fade">
            <div class="form-group">
              <label class="form-label">Set New 4-Digit PIN</label>
              <div style="display:flex; gap:10px;">
                <input type="password" maxlength="4" pattern="[0-9]*" class="input-field" id="setting-pin-code" placeholder="Enter 4 digit number" style="width:180px;">
                <button class="btn btn-primary" onclick="saveNewPIN()">Save PIN</button>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Right Column: Budgets & Data Recovery -->
      <div style="display:flex; flex-direction:column; gap:24px;">
        
        <!-- Budgets setup Card -->
        <div class="glass-card">
          <h3 style="font-weight:600; margin-bottom:20px;"><i class="fas fa-sliders-h" style="color:var(--color-info); margin-right:8px;"></i> Budget Configurations</h3>
          
          <div class="form-group" style="margin-bottom:20px;">
            <label class="form-label">Global Monthly Budget Limit</label>
            <div style="display:flex; gap:10px;">
              <input type="number" class="input-field" id="setting-monthly-budget">
              <button class="btn btn-primary" onclick="saveMonthlyBudgetSetting()">Save</button>
            </div>
          </div>

          <div style="border-top: 1px solid var(--glass-border); padding-top:16px;">
            <h4 style="font-size:0.9rem; font-weight:600; margin-bottom:12px; color:var(--text-secondary);">Category Specific Budgets</h4>
            <div id="category-budgets-inputs-list" style="max-height: 250px; overflow-y:auto; padding-right:6px;">
              <!-- Budgets lists -->
            </div>
            <button class="btn" style="width:100%; font-size:0.85rem; margin-top:12px;" onclick="saveCategoryBudgetsList()">Save Category Budgets</button>
          </div>
        </div>

        <!-- Data administration Card -->
        <div class="glass-card">
          <h3 style="font-weight:600; margin-bottom:20px;"><i class="fas fa-database" style="color:var(--color-danger); margin-right:8px;"></i> Data Administration</h3>
          
          <p style="font-size:0.85rem; color:var(--text-secondary); line-height:1.6; margin-bottom:20px;">
            Manage and backup your database safely. Since Expense Tracker operates completely offline, all data is contained directly inside this browser's database.
          </p>

          <div style="display:flex; flex-direction:column; gap:12px;">
            <button class="btn" onclick="triggerBackupDownload()"><i class="fas fa-download"></i> Backup Data (JSON)</button>
            
            <div style="display:flex; flex-direction:column; gap:6px;">
              <button class="btn" onclick="clickImportInput()"><i class="fas fa-upload"></i> Restore Backup (JSON)</button>
              <input type="file" id="setting-import-file" accept="application/json" onchange="restoreBackupFile(event)" style="display:none;">
            </div>
            
            <button class="btn btn-danger" onclick="triggerResetApp()"><i class="fas fa-trash-alt"></i> Reset App & Clear Data</button>
          </div>
        </div>

      </div>

    </div>

  </div>

  <!-- Load Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/wallet.js"></script>
  <script src="js/budget.js"></script>
  <script src="js/transaction.js"></script>
  <script src="js/export.js"></script>
  <script src="js/import.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    // Inline Settings script to control Settings UI binding
    document.addEventListener('DOMContentLoaded', () => {
      loadSettingsUI();
    });

    function loadSettingsUI() {
      const state = window.StorageModule.loadState();
      
      // Selected visual settings
      document.getElementById('setting-language').value = state.settings.language || 'en';
      document.getElementById('setting-currency').value = state.settings.currency || 'USD';
      document.getElementById('setting-date-format').value = state.settings.dateFormat || 'YYYY-MM-DD';
      document.getElementById('setting-notifications').checked = state.settings.notifications !== false;
      
      // Theme states styles
      updateThemeButtons(state.settings.theme || 'dark');
      
      // Security states
      const pinEnabled = !!state.settings.pinLockEnabled;
      document.getElementById('setting-pin-enabled').checked = pinEnabled;
      document.getElementById('pin-change-group').style.display = pinEnabled ? 'flex' : 'none';
      document.getElementById('setting-pin-code').value = state.settings.pinCode || '';
      
      // Monthly Budget
      document.getElementById('setting-monthly-budget').value = state.budgets.monthly || 0;
      
      // Render Category budgets list
      const budgetsList = document.getElementById('category-budgets-inputs-list');
      if (budgetsList) {
        budgetsList.innerHTML = state.categories.map(c => {
          // Exclude Salary & Freelancing from expense budgets
          if (['Salary', 'Freelancing'].includes(c)) return '';
          
          const limit = (state.budgets.categories && state.budgets.categories[c]) || 0;
          return `
            <div class="category-budget-row">
              <span style="font-size:0.85rem; font-weight:500;">${c}</span>
              <input type="number" class="input-field category-budget-input" data-category="${c}" value="${limit}" style="padding:6px 12px; font-size:0.85rem;">
            </div>
          `;
        }).join('');
      }
    }

    function updateThemeButtons(theme) {
      const darkBtn = document.getElementById('theme-btn-dark');
      const lightBtn = document.getElementById('theme-btn-light');
      
      if (theme === 'light') {
        lightBtn.style.background = 'var(--accent-primary)';
        lightBtn.style.color = '#fff';
        darkBtn.style.background = 'var(--glass-bg)';
        darkBtn.style.color = 'var(--text-primary)';
      } else {
        darkBtn.style.background = 'var(--accent-primary)';
        darkBtn.style.color = '#fff';
        lightBtn.style.background = 'var(--glass-bg)';
        lightBtn.style.color = 'var(--text-primary)';
      }
    }

    function selectThemeSetting(theme) {
      const state = window.StorageModule.loadState();
      state.settings.theme = theme;
      window.StorageModule.saveState();
      window.ThemeModule.applyTheme(theme);
      updateThemeButtons(theme);
      window.AppModule.showToast('Theme updated successfully', 'success');
    }

    function saveAppSetting(key, val) {
      const state = window.StorageModule.loadState();
      state.settings[key] = val;
      window.StorageModule.saveState();
      window.AppModule.showToast('Setting saved successfully', 'success');
    }

    function updateLocalizations() {
      if (window.SettingsModule) {
        window.SettingsModule.applyLocalization();
      }
    }

    // Security PIN Lock toggling
    function togglePinLockStatus(enabled) {
      const state = window.StorageModule.loadState();
      state.settings.pinLockEnabled = enabled;
      window.StorageModule.saveState();
      
      document.getElementById('pin-change-group').style.display = enabled ? 'flex' : 'none';
      
      if (enabled) {
        window.AppModule.showToast('PIN security lock enabled. Please configure your PIN code.', 'info');
      } else {
        window.AppModule.showToast('Security PIN lock disabled.', 'success');
      }
    }

    function saveNewPIN() {
      const pinVal = document.getElementById('setting-pin-code').value;
      if (!/^\d{4}$/.test(pinVal)) {
        window.AppModule.showToast('PIN must be exactly 4 digits long.', 'danger');
        return;
      }
      
      const state = window.StorageModule.loadState();
      state.settings.pinCode = pinVal;
      window.StorageModule.saveState();
      window.AppModule.showToast('Security PIN updated successfully.', 'success');
    }

    // Budget Limits actions
    function saveMonthlyBudgetSetting() {
      const val = Number(document.getElementById('setting-monthly-budget').value) || 0;
      window.BudgetModule.setMonthlyBudget(val);
      window.AppModule.showToast('Monthly Budget updated.', 'success');
    }

    function saveCategoryBudgetsList() {
      const inputs = document.querySelectorAll('.category-budget-input');
      inputs.forEach(input => {
        const cat = input.getAttribute('data-category');
        const val = Number(input.value) || 0;
        window.BudgetModule.setCategoryBudget(cat, val);
      });
      window.AppModule.showToast('Category Budgets saved.', 'success');
    }

    // Data backups
    function triggerBackupDownload() {
      const state = window.StorageModule.loadState();
      window.ExportModule.exportToJSON(state);
    }

    function clickImportInput() {
      document.getElementById('setting-import-file').click();
    }

    function restoreBackupFile(event) {
      const file = event.target.files[0];
      if (file) {
        window.AppModule.showConfirm('Restore Backup', 'Are you sure you want to restore this file? It will replace all existing transactions and configurations.', () => {
          window.ImportModule.importBackupFile(file, () => {
            window.AppModule.showToast('Backup restored successfully. Reloading...', 'success');
            setTimeout(() => {
              window.location.reload();
            }, 1500);
          }, (errMsg) => {
            window.AppModule.showToast(errMsg, 'danger');
          });
        });
      }
    }

    function triggerResetApp() {
      window.AppModule.showConfirm('Reset Application', 'WARNING: This will wipe out all local storage transactions, custom categories, profile setups, and settings. This cannot be undone!', () => {
        window.StorageModule.resetState();
        sessionStorage.removeItem('EXPENSE_TRACKER_PRO_UNLOCKED');
        localStorage.removeItem('EXPENSE_TRACKER_ONBOARDING_DONE');
        window.AppModule.showToast('Application reset completed. Restarting...', 'success');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
      });
    }
  </script>
</body>
</html>
